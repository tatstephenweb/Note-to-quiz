<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#E8500A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="QuizApp">

    <title>Document</title>
    <link rel="stylesheet" href="style.css">  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    h2 { color: #333; }
    .box {
      border: 2px dashed #aaa;
      border-radius: 12px;
      padding: 40px 20px;
      margin: 20px 0;
      cursor: pointer;
    }
    input[type="file"] { margin: 10px 0; }
    button {
      padding: 12px 30px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .error { color: red; margin-top: 10px; }
    .loading { display: none; color: #888; margin-top: 15px; }
    
    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --accent: #e8500a;
      --accent2: #2563eb;
      --muted: #8a8070;
      --card: #fff;
      --border: #e2dbd0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .relative-z { position: relative; z-index: 1; }

    /* Upload zone */
    .drop-zone {
      border: 2px dashed var(--border);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: #fff9f5;
    }
    .drop-zone.dragover { background: #fff3ec; }

    /* Pill tag */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Progress bar */
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Question card */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: box-shadow 0.2s;
    }
    .question-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.07); }

    /* Option button */
    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent2);
      background: #f0f5ff;
      transform: translateX(3px);
    }
    .option-btn.selected { border-color: var(--accent2); background: #eff6ff; }
    .option-btn.correct  { border-color: #16a34a; background: #f0fdf4; }
    .option-btn.wrong    { border-color: #dc2626; background: #fef2f2; }
    .option-btn:disabled { cursor: default; }

    /* Letter badge */
    .letter-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }

    /* Action button */
    .btn-primary {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-accent:hover { background: #c94008; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    /* Spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade in */
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* Score ring */
    .score-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--border) 0);
      display: flex; align-items: center; justify-content: center;
    }
    .score-ring-inner {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: var(--card);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* Mobile nav tabs */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2.5px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Settings grid */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }

    .setting-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--paper);
    }
    .setting-card.selected { border-color: var(--accent); background: #fff9f7; }

    /* File chip */
    .file-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    select, input[type=range] {
      font-family: 'DM Sans', sans-serif;
    }
    select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--paper);
      font-size: 0.9rem;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* Confetti dots (decorative) */
    .dot-grid {
      background-image: radial-gradient(circle, var(--border) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
    </style>
</head>
<body>

     <nav class="relative-z bg-paper border-b" style="border-color: var(--border);">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <!-- Logo mark -->
            <span class="font-display font-700 text-lg tracking-tight" style="font-family: 'Syne', sans-serif; font-weight: 700;">Quizzer</span>
        </div>
        
        </div>
    </nav>

    <div id="screen-preview" class="fade-in p-8">

      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
          <h2 class="font-display font-700 text-2xl" style="font-family: 'Syne', sans-serif;">Quiz Ready</h2>
          <br><p class="text-sm mt-0.5" style="color: var(--muted);" id="previewSubtitle">Your Quiz is ready<br>Click Back to exit the quiz or click StartQuiz to start quiz for your lecture.</p>
          <br><p class="text-sm mt-0.5" style="color: var(--muted);">No.of Questions: 53</p>
                    
        </div>
        <div class="flex gap-2 flex-wrap">
          <a href="/" class="btn-ghost px-4 py-2 text-sm">Back</a>
          <a href="/quiz" class="btn-accent px-5 py-2 text-sm">Start Quiz</a>
        </div>
      </div>

      </div>

      <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log('Service Worker registered'))
      .catch(err => console.log('SW error:', err));
  }
</script>
</body>
</html>
